<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 56 56">
  <defs>
    <clipPath id="db2-top">
      <rect x="4" y="4" width="48" height="25"/>
    </clipPath>
    <clipPath id="db2-bottom">
      <rect x="0" y="28" width="56" height="28"/>
    </clipPath>
  </defs>

  <!-- Black rounded square background -->
  <rect width="56" height="56" rx="10" fill="#000"/>

  <!-- Green bottom half -->
  <rect y="28" width="56" height="38" rx="10" fill="#3db843"/>
  <!-- Square off the top corners of the green rect -->
  <rect y="28" width="56" height="10" fill="#3db843"/>

  <!-- IBM stripe logo: white text with black horizontal bar cuts -->
  <g clip-path="url(#db2-top)">
    <text x="28" y="17" font-family="Arial Black, Arial, sans-serif"
          font-size="19" font-weight="900" fill="white"
          text-anchor="middle" dominant-baseline="middle"
          letter-spacing="1">IBM</text>
    <!-- Black stripes cut through the letters -->
    <rect x="4" y="7"  width="48" height="1.8" fill="#000"/>
    <rect x="4" y="10.6" width="48" height="1.8" fill="#000"/>
    <rect x="4" y="14.2" width="48" height="1.8" fill="#000"/>
    <rect x="4" y="17.8" width="48" height="1.8" fill="#000"/>
    <rect x="4" y="21.4" width="48" height="1.8" fill="#000"/>
    <rect x="4" y="25"   width="48" height="1.8" fill="#000"/>
  </g>

  <!-- DB2 text in green area -->
  <text x="28" y="42" font-family="Arial, sans-serif"
        font-size="14" font-weight="bold" fill="white"
        text-anchor="middle" dominant-baseline="middle">DB2</text>
</svg>
