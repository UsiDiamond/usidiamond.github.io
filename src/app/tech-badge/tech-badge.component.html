@for (badge of badges; track badge.key) {
  <a
    [href]="badge.releaseUrl"
    target="_blank"
    rel="noopener noreferrer"
    class="tech-badge-link"
    [title]="badge.displayName"
    [attr.aria-label]="badge.displayName + ' — release notes (opens in new tab)'"
  >
    @if (badge.resolvedIconUrl) {
      <img
        [src]="badge.resolvedIconUrl"
        [alt]="badge.displayName"
        width="32"
        height="32"
        loading="lazy"
      />
    } @else {
      <span class="tech-text-badge" aria-hidden="true">{{ badge.initials }}</span>
    }
  </a>
}
