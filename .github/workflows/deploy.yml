# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Only deploy after integration tests pass on the target branch
  workflow_run:
    workflows: ["Integration Tests"]
    types: [completed]
    branches: ["main", "release/*"]

  # Allow manual deploys from the Actions tab (bypasses test gate)
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip if triggered by a failed integration test run
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      # --- workflow_run path: reuse the artifact built and verified by integration tests ---
      - name: Download pre-built site from integration tests
        if: github.event_name != 'workflow_dispatch'
        uses: actions/download-artifact@v8
        with:
          name: site-build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: site

      # --- workflow_dispatch path: build fresh ---
      - name: Checkout
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v5

      - name: Setup Node.js
        if: github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install and build
        if: github.event_name == 'workflow_dispatch'
        run: npm install && npm run build

      - name: Stage build output
        if: github.event_name == 'workflow_dispatch'
        run: mkdir -p site && cp -r public/usidiamond.github.io/browser/. site/

      # --- common: hand off to deploy job ---
      - name: Upload site for deployment
        uses: actions/upload-artifact@v7
        with:
          name: site-for-deploy
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download site
        uses: actions/download-artifact@v8
        with:
          name: site-for-deploy
          path: ${{ runner.temp }}/site-for-deploy

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/site-for-deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
