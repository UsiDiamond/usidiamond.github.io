# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Only deploy after integration tests pass on the target branch
  workflow_run:
    workflows: ["Integration Tests"]
    types: [completed]
    branches: ["main", "release/*"]

  # Allow manual deploys from the Actions tab (bypasses test gate)
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip if triggered by a failed integration test run
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - uses: actions/checkout@v5
        with:
          # Check out the commit that triggered the integration tests,
          # not necessarily the tip of the default branch
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - run: npm install
      - run: npm run build

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Static-Built-Site
          path: public/usidiamond.github.io/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: Static-Built-Site
          path: .
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
