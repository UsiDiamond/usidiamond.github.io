name: Integration Tests

on:
  push:
    branches: ["main", "release/*"]
  pull_request:
    branches: ["main", "release/*"]

permissions:
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Upload site build
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: public/usidiamond.github.io/browser
          # Only needs to live long enough for the test job and deploy workflow
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Download site build
        uses: actions/download-artifact@v8
        with:
          name: site-build
          path: public/usidiamond.github.io/browser

      - name: Run integration tests
        run: npm run e2e

      - name: Upload test report
        id: upload-report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-report
          path: integration-tests-report/
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: node generate-summary.js
        env:
          ARTIFACT_URL: ${{ steps.upload-report.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Comment integration test summary on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: integration-tests
          path: integration-tests-report/pr-comment.md

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: integration-tests-report/cucumber-junit.xml
