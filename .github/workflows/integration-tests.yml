name: Integration Tests

on:
  push:
    branches: ["main", "release/*"]
  pull_request:
    branches: ["main", "release/*"]

permissions:
  checks: write
  pull-requests: write

jobs:
  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Upload site build
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: public/usidiamond.github.io/browser
          # Only needs to live long enough for the test job and deploy workflow
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Download site build
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: public/usidiamond.github.io/browser

      - name: Run integration tests
        run: npm run e2e

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-report
          path: integration-tests-report/
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: integration-tests-report/cucumber-junit.xml
